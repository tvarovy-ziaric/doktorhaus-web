name: Deploy website to FTP

on:
  workflow_dispatch:
    inputs:
      protocol:
        description: FTP protocol
        required: true
        default: ftp
        type: choice
        options:
          - ftp
          - ftps
          - ftps-legacy
      port:
        description: FTP port
        required: true
        default: "21"
        type: string
      log_level:
        description: Deploy log level
        required: true
        default: standard
        type: choice
        options:
          - minimal
          - standard
          - verbose

jobs:
  deploy:
    name: Upload current version
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check FTP secrets
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          missing=0
          for name in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_SERVER_DIR; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is not set in Settings > Secrets and variables > Actions > Repository secrets."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Upload files by FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          port: ${{ inputs.port }}
          protocol: ${{ inputs.protocol }}
          security: loose
          timeout: 60000
          log-level: ${{ inputs.log_level }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            api/public-help.config.php
            data/public-help.json
            uploads/pomoc-verejnosti/**
