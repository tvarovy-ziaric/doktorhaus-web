name: Deploy website to FTP

on:
  workflow_dispatch:
    inputs:
      protocol:
        description: FTP protocol
        required: true
        default: ftp
        type: choice
        options:
          - ftp
          - ftps
          - ftps-legacy
      port:
        description: FTP port
        required: true
        default: "21"
        type: string
      log_level:
        description: Deploy log level
        required: true
        default: standard
        type: choice
        options:
          - minimal
          - standard
          - verbose

jobs:
  deploy:
    name: Upload current version
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Check FTP secrets
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          missing=0
          for name in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_SERVER_DIR; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is not set in Settings > Secrets and variables > Actions > Repository secrets."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Upload files by lftp
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
          FTP_PROTOCOL: ${{ inputs.protocol }}
          FTP_PORT: ${{ inputs.port }}
        run: |
          set -euo pipefail

          if [ "$FTP_PROTOCOL" = "ftp" ]; then
            LFTP_SSL="false"
            LFTP_URL="ftp://$FTP_SERVER:$FTP_PORT"
          elif [ "$FTP_PROTOCOL" = "ftps" ]; then
            LFTP_SSL="true"
            LFTP_URL="ftp://$FTP_SERVER:$FTP_PORT"
          else
            LFTP_SSL="true"
            LFTP_URL="ftps://$FTP_SERVER:$FTP_PORT"
          fi

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$LFTP_URL" <<EOF
          set ftp:ssl-allow $LFTP_SSL
          set ftp:ssl-force $LFTP_SSL
          set ftp:ssl-protect-data $LFTP_SSL
          set ssl:verify-certificate no
          set ftp:passive-mode on
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          mirror --reverse --verbose --only-newer --parallel=1 \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob node_modules/ \
            --exclude api/public-help.config.php \
            --exclude data/public-help.json \
            --exclude-glob uploads/pomoc-verejnosti/* \
            ./ "$FTP_SERVER_DIR"
          bye
          EOF
